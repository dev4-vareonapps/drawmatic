services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drawmatic-app
    ports:
      # Host 3001 avoids conflict with a local Next.js dev server on 3000
      - "3001:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/drawmatic
      DATABASE_NAME: drawmatic
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: drawmatic-mongodb
    # No host port published by default (avoids conflict with local MongoDB on 27017).
    # To expose from the host, add: ports: ["127.0.0.1:27027:27017"]
    environment:
      MONGO_INITDB_DATABASE: drawmatic
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/drawmatic --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  dev-portal:
    image: nginx:alpine
    container_name: drawmatic-dev-portal
    ports:
      - "8081:8081"
    volumes:
      - ./docker/dev-portal/index.html:/usr/share/nginx/html/index.html:ro
      - ./docker/dev-portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: drawmatic-mongo-express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      # Disable browser basic-auth popup for local dev (use dev portal on :8081 instead)
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_data:
